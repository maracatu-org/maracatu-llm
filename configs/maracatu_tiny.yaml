
run_name: maracatu-tiny-test
seed: 42

corpus_path: data/processed/corpus.txt
tokenizer_path: tokenizer/maracatu.model
val_fraction: 0.01

vocab_size: 16000
hidden_size: 256
intermediate_size: 704
num_hidden_layers: 4
num_attention_heads: 4
num_key_value_heads: 4
max_position_embeddings: 256
rms_norm_eps: 1.0e-5
rope_theta: 10000.0
attention_dropout: 0.0
tie_word_embeddings: true

batch_size: 32
learning_rate: 5.0e-4
min_learning_rate: 5.0e-5
beta1: 0.9
beta2: 0.95
weight_decay: 0.1
grad_clip: 1.0

max_iters: 5000
warmup_iters: 200

log_interval: 25
eval_interval: 250
checkpoint_interval: 500
