
run_name: maracatu-80m-lab-v1
seed: 42

corpus_path: data/processed/corpus_v2.txt
tokenizer_path: tokenizer/maracatu.model
val_fraction: 0.005

vocab_size: 16000
hidden_size: 768
intermediate_size: 2048
num_hidden_layers: 12
num_attention_heads: 12
num_key_value_heads: 4
max_position_embeddings: 1024
rms_norm_eps: 1.0e-5
rope_theta: 10000.0
attention_dropout: 0.0
tie_word_embeddings: true

batch_size: 8
learning_rate: 2.5e-4
min_learning_rate: 2.5e-5
beta1: 0.9
beta2: 0.95
weight_decay: 0.1
grad_clip: 1.0

max_iters: 200000
warmup_iters: 4000

log_interval: 100
eval_interval: 1000
checkpoint_interval: 2000
checkpoint_interval_minutes: 30

use_bf16_autocast: true
