
run_name: maracatu-20m-v1
seed: 42

corpus_path: data/processed/corpus.txt
tokenizer_path: tokenizer/maracatu.model
val_fraction: 0.005

vocab_size: 16000
hidden_size: 384
intermediate_size: 1024
num_hidden_layers: 6
num_attention_heads: 6
num_key_value_heads: 6
max_position_embeddings: 512
rms_norm_eps: 1.0e-5
rope_theta: 10000.0
attention_dropout: 0.0
tie_word_embeddings: true

batch_size: 16
learning_rate: 3.0e-4
min_learning_rate: 3.0e-5
beta1: 0.9
beta2: 0.95
weight_decay: 0.1
grad_clip: 1.0

max_iters: 50000
warmup_iters: 1000

log_interval: 50
eval_interval: 500
checkpoint_interval: 1000
