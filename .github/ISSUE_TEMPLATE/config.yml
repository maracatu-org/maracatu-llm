blank_issues_enabled: false
contact_links:
  - name: Vulnerability or security / model issue
    url: https://github.com/maracatu-labs/maracatu/security/advisories/new
    about: Report privately via GitHub Security Advisories or email contact@maracatu.org. Do not open a public issue.
  - name: Question or discussion
    url: https://github.com/maracatu-labs/maracatu/discussions
    about: For questions, early-stage ideas, and roadmap debates.
  - name: Released models (Hugging Face)
    url: https://huggingface.co/maracatu-labs
    about: For questions specific to using the released models, open a discussion on the model's HF page.
